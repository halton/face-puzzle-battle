name: face_puzzle_battle
description: "拼脸大作战 - A fun face puzzle game where facial features drop and you blink to place them!"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.18.0
  google_mlkit_face_detection: ^0.11.0
  camera: ^0.11.0+2
  image: ^4.3.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  provider: ^6.1.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
